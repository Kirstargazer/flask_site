<!DOCTYPE html>
<html>
<head>
    <title>Заявки</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Список заявок</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Действие</th>
        </tr>

        {% for lead in leads %}
        <tr>
            <td>{{ lead[0] }}</td>
            <td>{{ lead[1] }}</td>
            <td>{{ lead[2] }}</td>
            <td>
                <a href="{{ url_for('edit_lead', lead_id=lead[0]) }}"> Редактировать </a>

                <form method="POST" action="{{ url_for('delete_lead', lead_id=lead[0]) }}">
                    <button type="submit">Удалить</button>
                </form>
            </td>
            
        </tr>
        {% endfor %}

    </table>

</body>
</html>
